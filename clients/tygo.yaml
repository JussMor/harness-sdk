# tygo configuration — generates TypeScript type declarations from the
# Go SDK so the harness-client package never drifts from the canonical
# Go protocol definitions.
#
# Regenerate with:  make client-types
# CI guard:         make client-types-check (fails on diff)
#
# We only emit types for the wire-protocol surface: stream events,
# interrupts, artifacts, plans, tools. Internal runtime types (Engine,
# Runtime, Tracer, ...) are intentionally excluded.

packages:
  - path: "github.com/everfaz/autobuild-sdk"
    output_path: "clients/harness-client/src/generated/types.ts"
    type_mappings:
      time.Time: "string"
      time.Duration: "number"
      json.RawMessage: "unknown"
      # Internal SDK types that are not part of the wire protocol — surface
      # as opaque values to keep the TS surface focused on what crosses
      # the wire. Bumping ProtocolVersion is required when removing one.
      Engine: "unknown"
      LLMProvider: "unknown"
      StreamingLLMProvider: "unknown"
      Runtime: "unknown"
      InterruptStore: "unknown"
      WebhookStore: "unknown"
      WebhookDispatcher: "unknown"
      InterruptGate: "unknown"
      ApprovalGate: "unknown"
      HumanApprovalFilter: "unknown"
      SafetyFilter: "unknown"
      Tracer: "unknown"
      Tokenizer: "unknown"
      Subagent: "unknown"
      Conversation: "unknown"
      ConversationStore: "unknown"
    fallback_type: "unknown"
    frontmatter: |
      // Code generated by tygo from sdk/*.go. DO NOT EDIT.
      // Source: github.com/everfaz/autobuild-sdk
      // Regenerate with: make client-types
